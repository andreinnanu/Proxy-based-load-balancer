worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
}

http {
    # Disable access logs (saves I/O on each request)
    access_log off;
    error_log /dev/null crit;

    # Keepalive for clients and upstreams (re-use TCP connections)
    keepalive_timeout 65;
    keepalive_requests 10000;

    # Remove extra buffering
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    upstream workers {
        least_conn;

        server 172.20.0.2:7777 max_fails=0;
        server 172.20.0.3:7777 max_fails=0;
        server 172.20.0.4:7777 max_fails=0;
        server 172.20.0.5:7777 max_fails=0;
        server 172.20.0.6:7777 max_fails=0;
        server 172.20.0.7:7777 max_fails=0;

        keepalive 256;  # reuse upstream connections
    }

    server {
        location / {
            proxy_pass http://workers;

            # Disable buffering for low latency
            proxy_buffering off;
            proxy_request_buffering off;

            # Remove retries/fallbacks
            proxy_next_upstream off;

            # Forward minimal headers only
            proxy_set_header Connection "";
        }
    }
}
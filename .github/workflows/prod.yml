name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout code from the repository
    - name: Checkout code
      uses: actions/checkout@v2

      # Cache dependencies to speed up build times
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          worker/.cargo
          worker/target/
          load_balancer/.cargo
          load_balancer/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install Rust
      run: rustup update stable && rustup default stable

    - name: Build workers
      working-directory: ./worker
      run: |
        cargo build --verbose

    - name: Build load balancer
      working-directory: ./load_balancer
      run: |
        cargo build --verbose
        cargo test --verbose

          # Set up Docker Buildx for multi-platform builds
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker images
      uses: docker/bake-action@v2.3.0
      with:
        push: true
        files: |
          compose.yml
        set: |
          *.cache-from=type=gha
          *.cache-to=type=gha,mode=max
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER || 'ec2-user' }}@${{ secrets.EC2_HOST }} "hostname"

      - name: Copy docker-compose.yml to EC2
        run: |
          scp -o StrictHostKeyChecking=no compose.yml \
          ${{ secrets.EC2_USER || 'ec2-user' }}@${{ secrets.EC2_HOST }}:/home/ec2-user/

      - name: Run docker compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER || 'ec2-user' }}@${{ secrets.EC2_HOST }} \
          "cd /home/ec2-user && docker-compose up -d"

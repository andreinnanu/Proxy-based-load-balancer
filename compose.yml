networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  nginx:
    image: nginx:alpine
    ports:
      - "4000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      app_net:
        ipv4_address: 172.20.0.101

  load_balancer:
    image: andreinanu/rusty_load_balancer:latest
    build:
      context: ./load_balancer
    ports:
      - "3000:3000"
    volumes:
      - ./load_balancer/resources/:/app/
    networks:
      app_net:
        ipv4_address: 172.20.0.100
    environment:
      RUST_LOG: "info"

# Workers are defined manually with static IPs instead of using scaling.
# This avoids relying on Docker DNS for internal load-balancing within the network. 
  worker1:
    image: andreinanu/lb_worker:latest
    build:
      context: ./worker
    networks:
      app_net:
        ipv4_address: 172.20.0.2
    environment:
      WORK_DURATION_MS: 50

  worker2:
    image: andreinanu/lb_worker:latest
    build:
      context: ./worker
    networks:
      app_net:
        ipv4_address: 172.20.0.3
    environment:
      WORK_DURATION_MS: 50

  worker3:
    image: andreinanu/lb_worker:latest
    build:
      context: ./worker
    networks:
      app_net:
        ipv4_address: 172.20.0.4
    environment:
      WORK_DURATION_MS: 50

  worker4:
    image: andreinanu/lb_worker:latest
    build:
      context: ./worker
    networks:
      app_net:
        ipv4_address: 172.20.0.5
    environment:
      WORK_DURATION_MS: 50

  worker5:
    image: andreinanu/lb_worker:latest
    build:
      context: ./worker
    networks:
      app_net:
        ipv4_address: 172.20.0.6
    environment:
      WORK_DURATION_MS: 150

  worker6:
    image: andreinanu/lb_worker:latest
    build:
      context: ./worker
    networks:
      app_net:
        ipv4_address: 172.20.0.7
    environment:
      WORK_DURATION_MS: 150
